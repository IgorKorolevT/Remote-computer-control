<h4 class="mb-3">Computers <a href="{% url 'computer:add' %}" class="btn btn-outline-primary">+</a>
</h4>
<ul class="list">
    {% for computer in computer_list %}
        <li class="mb-2">
            <a href="{% url url computer.name %}"
               class="text-decoration-none">{{ computer.nickname|default:computer.name }}</a>
        </li>
    {% endfor %}
</ul>

{% extends 'base.html' %}

{% block title %}Add Your Computer{% endblock %}
{% load crispy_forms_filters %}


{% block content %}
    <div class="container-fluid text-center mx-0">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <h2>Add Your Computer</h2>
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <button type="submit" class="btn btn-primary">Submit</button>
                </form>
            </div>
        </div>
    </div>
{% endblock %}

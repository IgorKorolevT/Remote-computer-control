{% extends 'base_card.html' %}

{% block title %}Change Password{% endblock %}
{% load crispy_forms_filters %}


{% block card_content %}
    <h2>Change password</h2>
    <form method="post">
        {% csrf_token %}
        {{ form|crispy }}
        <input type="submit" value="Change password" class="btn btn-outline-primary">
    </form>
{% endblock %}

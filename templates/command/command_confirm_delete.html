{% extends 'base.html' %}
{% block content %}
    <h2>Delete command</h2>
    <form action="" method="post">
        {% csrf_token %}
        <p>
            Are you sure you want to delete the command <strong>"{{ object.name }}"</strong>?<br>
        </p>
        <button type="submit" class="btn btn-danger">Delete</button>
    </form>
{% endblock %}

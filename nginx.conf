events {}

http {
    include /etc/nginx/mime.types;
    server_tokens off;

    server{
        listen 80;
        server_name igorkorolevcourseproject.duckdns.org www.igorkorolevcourseproject.duckdns.org 192.168.50.16;
        return 301 https://$host$request_uri;


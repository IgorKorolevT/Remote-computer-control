services:
  web:
    build:
      context: .
    container_name: web
    volumes:
      - .:/app
      - static:/app/staticfiles
      - media:/app/media
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - postgres

  worker:
    build:
      context: .
    container_name: worker
    volumes:
      - .:/app
      - static:/app/staticfiles
      - media:/app/media
    command: celery -A Django_course_project worker -l INFO --concurrency=4
    depends_on:
      - web
      - redis

  celery-beat:
    build:
      context: .
    container_name: celery_beat
    volumes:
      - .:/app
      - static:/app/staticfiles
      - media:/app/media
    command: celery -A Django_course_project beat -l INFO
    depends_on:
      - web
      - redis

  redis:
    image: redis:7
    container_name: computer_control_redis

  postgres:
    image: postgres
    environment:
      - POSTGRES_DB=db
      - POSTGRES_USER=postgres_user
      - POSTGRES_PASSWORD=12345
      - POSTGRES_HOST=127.0.0.1
    ports:
      - "5432:5432"
    container_name: pgdb
    volumes:
      - pgdbdata:/var/lib/postgresql/

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin_web
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: SecretPassword123
    ports:
      - "8080:80"
    depends_on:
      - postgres

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - static:/app/staticfiles
      - media:/app/media
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl_certificate:/etc/nginx/ssl_certificate
    depends_on:
      - web

volumes:
  static:
  media:
  pgdbdata:
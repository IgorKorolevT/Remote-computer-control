services:
  web:
    build: .
#    command: >
#      sh -c "python manage.py collectstatic --noinput &&
#             uv run manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
      - static:/app/staticfiles
      - media:/app/media
    ports:
          - "8000:8000"
    depends_on:
      - redis

  redis:
    image: redis:7

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - static:/app/staticfiles
      - media:/app/media
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - web

volumes:
  static:
  media:
services:
  web:
    build:
      context: .
    container_name: web
    volumes:
      - .:/app
      - static:/app/staticfiles
      - media:/app/media
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - postgres

  redis:
    image: redis:7

  postgres:
    image: postgres
    environment:
      - POSTGRES_DB=db
      - POSTGRES_USER=postgres_user
      - POSTGRES_PASSWORD=12345
      - POSTGRES_HOST=127.0.0.1
    ports:
      - "5432:5432"
    container_name: pgdb
    volumes:
      - pgdbdata:/var/lib/postgresql/data/


  nginx:
    image: nginx:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - static:/app/staticfiles
      - media:/app/media
      - ./nginx.conf:/etc/nginx/nginx.conf
      - /etc/letsencrypt/:/etc/letsencrypt/
    depends_on:
      - web

volumes:
  static:
  media:
  pgdbdata: